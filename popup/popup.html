<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube SRT Overlay</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>YouTube SRT Overlay</h1>

      <section class="card">
        <label for="srtFile">SRT file</label>
        <input id="srtFile" type="file" accept=".srt,text/plain" />
        <div class="actions">
          <button id="clearBtn" type="button">Clear subtitles</button>
        </div>
        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <section class="card">
        <h2>Appearance</h2>

        <label for="fontSize">Font size</label>
        <input id="fontSize" type="range" min="18" max="72" step="1" />

        <label for="fontFamily">Font family</label>
        <select id="fontFamily">
          <option value="Arial, sans-serif">Arial</option>
          <option value="Verdana, sans-serif">Verdana</option>
          <option value="Tahoma, sans-serif">Tahoma</option>
          <option value="'Trebuchet MS', sans-serif">Trebuchet</option>
          <option value="'Times New Roman', serif">Times New Roman</option>
          <option value="'Courier New', monospace">Courier New</option>
        </select>

        <label for="color">Text color</label>
        <input id="color" type="color" />

        <label for="backgroundColor">Background color</label>
        <input id="backgroundColor" type="color" />

        <label for="backgroundOpacity">Background opacity</label>
        <input id="backgroundOpacity" type="range" min="0" max="1" step="0.05" />

        <label for="outlineColor">Outline color</label>
        <input id="outlineColor" type="color" />

        <label for="outlineWidth">Outline width</label>
        <input id="outlineWidth" type="range" min="0" max="6" step="1" />

        <label for="bottomOffset">Vertical position</label>
        <input id="bottomOffset" type="range" min="0" max="30" step="1" />

        <label for="maxWidth">Max subtitle width</label>
        <input id="maxWidth" type="range" min="40" max="100" step="1" />

        <label for="delayMs">Sync offset (ms)</label>
        <input id="delayMs" type="range" min="-3000" max="3000" step="50" />
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
